<header class="app-header">
  <h1 class="page-title" id="page-title">Dashboard</h1>
  <div class="user-menu">
    <div class="user-info">
      <div class="user-name" id="user-name">Loading...</div>
      <div class="user-role" id="user-role">Loading...</div>
    </div>
    <div class="user-avatar">
      <span class="user-initial"></span>
    </div>

    <!-- Notification Bell -->
    <div class="notification-bell" id="notification-trigger" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <div id="notification-badge" class="notification-badge" style="display: none;">0</div>
      
      <div class="notification-dropdown" id="notification-dropdown">
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
          <h5 style="margin:0;">Recent Activity</h5>
          <button class="btn btn-outline btn-sm" onclick="Layout.clearNotifications(event)" style="font-size: 10px;">Clear All</button>
        </div>
        <div id="notification-list" style="max-height: 400px; overflow-y: auto;">
          <div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px;">No new alerts</div>
        </div>
      </div>
    </div>
    <button id="theme-toggle" class="logout-btn" title="Toggle Light/Dark Theme" style="margin-right: 8px;">
      <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <button class="logout-btn" onclick="logout()">
      <span>Sign out</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logout-icon">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
