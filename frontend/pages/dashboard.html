<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="header-container"></div>

      <div class="page-container">

        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">📄</div>
            <div>
              <div class="stat-value" id="total-papers">0</div>
              <div class="stat-label">Total Papers</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✓</div>
            <div>
              <div class="stat-value" id="accepted-papers">0</div>
              <div class="stat-label">Accepted</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div>
              <div class="stat-value" id="pending-papers">0</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div>
              <div class="stat-value" id="total-users">0</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
        </div>

        <!-- Active Conferences -->
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
            <h3 class="card-title">🏛️ Active Conferences</h3>
            <a href="conferences.html" class="btn btn-sm btn-primary">Manage →</a>
          </div>
          <div class="card-body">
            <div id="active-conferences"></div>
          </div>
        </div>

        <!-- Recent Papers -->
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
            <h3 class="card-title">📋 Recent Papers</h3>
            <a href="papers.html" class="btn btn-sm btn-primary">View All →</a>
          </div>
          <div class="card-body">
            <div id="recent-activity"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
