<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="header-container"></div>

      <div class="page-container">
        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">📄</div>
            <div>
              <div class="stat-value" id="total-papers">0</div>
              <div class="stat-label">Total Papers</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✓</div>
            <div>
              <div class="stat-value" id="accepted-papers">0</div>
              <div class="stat-label">Accepted</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div>
              <div class="stat-value" id="pending-papers">0</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div>
              <div class="stat-value" id="total-users">0</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
        </div>

        <!-- Conference Settings (Admin/Chair only) -->
        <div class="card" id="conference-settings-card" style="display: none; margin-bottom: 24px;">
          <div class="card-header">
            <h3 class="card-title">Conference Settings</h3>
          </div>
          <div class="card-body" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <h4 style="margin: 0 0 8px 0;">Conference Status</h4>
              <p class="text-muted" style="margin: 0; font-size: 14px;">Toggle whether the conference is announced and open for authors to submit papers.</p>
            </div>
            <div>
              <button id="toggle-conference-btn" class="btn" onclick="window.toggleConferenceStatus()">Loading...</button>
            </div>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Recent Activity</h3>
          </div>
          <div class="card-body">
            <div id="recent-activity"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
