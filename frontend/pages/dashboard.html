<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Confy</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Sidebar (embedded) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4H20V20H4V4Z" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M8 8H16V10H8V8ZM8 12H14V14H8V12ZM8 16H12V18H8V16Z" fill="currentColor"/>
          </svg>
          <span class="logo-text">Confy</span>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <a href="dashboard.html" class="nav-item active" data-page="dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9L12 3L21 9L12 15L3 9Z M3 9V15L12 21L21 15V9"/>
            </svg>
            <span class="nav-label">Dashboard</span>
          </a>
          <a href="papers.html" class="nav-item" data-page="papers">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4H20V20H4V4Z"/>
              <path d="M8 8H16V10H8V8ZM8 12H14V14H8V12ZM8 16H12V18H8V16Z"/>
            </svg>
            <span class="nav-label">Papers</span>
          </a>
          <a href="reviews.html" class="nav-item" data-page="reviews">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L15 8H22L17 12L19 18L12 14L5 18L7 12L2 8H9L12 2Z"/>
            </svg>
            <span class="nav-label">Reviews</span>
          </a>
          <a href="schedule.html" class="nav-item" data-page="schedule">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="nav-label">Schedule</span>
          </a>
          <a href="users.html" class="nav-item" data-page="users">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-label">Users</span>
          </a>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <!-- Header (embedded) -->
      <header class="app-header">
        <h1 class="page-title">Dashboard</h1>
        <div class="user-menu">
          <div class="user-info">
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">Loading...</div>
          </div>
          <div class="user-avatar">
            <span id="user-initial">JD</span>
          </div>
          <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
      </header>

      <div class="page-container">
        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">📄</div>
            <div>
              <div class="stat-value" id="total-papers">0</div>
              <div class="stat-label">Total Papers</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✓</div>
            <div>
              <div class="stat-value" id="accepted-papers">0</div>
              <div class="stat-label">Accepted</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div>
              <div class="stat-value" id="pending-papers">0</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div>
              <div class="stat-value" id="total-users">0</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Recent Activity</h3>
          </div>
          <div class="card-body">
            <div id="recent-activity"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
