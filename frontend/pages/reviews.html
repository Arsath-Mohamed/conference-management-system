<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Confy</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo"><span class="logo-text">Confy</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="papers.html" class="nav-item">Papers</a>
        <a href="reviews.html" class="nav-item active">Reviews</a>
        <a href="schedule.html" class="nav-item">Schedule</a>
        <a href="users.html" class="nav-item">Users</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="app-header">
        <h1 class="page-title">Reviews</h1>
        <div class="user-menu">
          <div class="user-info"><div class="user-name" id="user-name">Loading...</div><div class="user-role" id="user-role">Loading...</div></div>
          <div class="user-avatar"><span id="user-initial">JD</span></div>
          <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
      </header>
      <div class="page-container">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Papers to Review</h3></div>
          <div class="card-body"><div id="reviews-list"></div></div>
        </div>
      </div>
    </main>
  </div>
  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/reviews.js"></script>
</body>
</html>
