<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papers - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center; }
    .modal-box { background:var(--bg-primary);border:1px solid var(--border-medium);border-radius:var(--radius-xl);padding:32px;width:100%;max-width:480px; }
    .modal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
    .modal-title { font-size:18px;font-weight:700; }
    .decision-actions { display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap; }
    .btn-warning { background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3); }
    .btn-warning:hover { background:rgba(245,158,11,0.25); }
    .btn-success { background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3); }
    .btn-success:hover { background:rgba(16,185,129,0.25); }
  </style>
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="header-container"></div>

      <div class="page-container">

        <!-- Submit section (authors only) -->
        <div id="submit-section" class="card" style="display:none;margin-bottom:24px;">
          <div class="card-header"><h3 class="card-title">📝 Submit New Paper</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Paper Title</label>
              <input type="text" id="title" class="form-input" placeholder="Enter paper title">
            </div>
            <div class="form-group">
              <label class="form-label">Select Conference</label>
              <select id="conferenceId" class="form-input" onchange="updateConferenceTopics()">
                <option value="">-- Choose a Conference --</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Paper Topics</label>
              <div id="topics-container" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Abstract</label>
              <textarea id="abstract" class="form-textarea" rows="5" placeholder="Enter abstract (minimum 50 characters)"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">PDF File</label>
              <input type="file" id="file" class="form-input" accept=".pdf">
              <div class="form-help">Max 5MB, PDF only.</div>
            </div>
          </div>
          <div class="card-footer">
            <button id="submit-btn" class="btn btn-primary" onclick="submitPaper()">Submit Paper</button>
          </div>
        </div>

        <!-- Search & Filter -->
        <div style="display:flex;gap:16px;margin-bottom:20px;align-items:center;">
          <div style="flex:1;position:relative;">
            <input type="text" id="paper-search" class="form-input" placeholder="Search by title or author name..." oninput="filterPapers()">
          </div>
          <div style="width:200px;">
            <select id="status-filter" class="form-input" onchange="filterPapers()">
              <option value="all">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="under_review">Under Review</option>
              <option value="revision">Revision</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>

        <!-- Papers List -->
        <div class="card">
          <div class="card-header"><h3 class="card-title">📄 Papers</h3></div>
          <div class="card-body"><div id="papers-list"></div></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Assign Reviewer Modal -->
  <div id="assign-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">👤 Assign Reviewer</h3>
        <button class="btn btn-sm" onclick="closeAssign()">✕</button>
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Paper: <strong id="assign-paper-title" style="color:var(--text-primary);"></strong></p>
      <div class="form-group">
        <label class="form-label">Select Reviewer</label>
        <select id="reviewer-select" class="form-input">
          <option value="">-- Select Reviewer --</option>
        </select>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-secondary" onclick="closeAssign()">Cancel</button>
        <button id="confirm-assign-btn" class="btn btn-primary" onclick="confirmAssign()">Assign Reviewer</button>
      </div>
    </div>
  </div>

  <!-- Decision Modal -->
  <div id="decision-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">⚖️ Make Final Decision</h3>
        <button class="btn btn-sm" onclick="closeDecision()">✕</button>
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">Paper: <strong id="decision-paper-title" style="color:var(--text-primary);"></strong></p>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:20px;">This decision will be sent to the author via notification and email.</p>
      <div class="decision-actions">
        <button id="btn-accepted" class="btn btn-success" onclick="confirmDecision('accepted')">✅ Accept</button>
        <button id="btn-revision" class="btn btn-warning" onclick="confirmDecision('revision')">🔄 Request Revision</button>
        <button id="btn-rejected" class="btn btn-danger" onclick="confirmDecision('rejected')">❌ Reject</button>
      </div>
      <div style="text-align:center;margin-top:16px;">
        <button class="btn btn-secondary btn-sm" onclick="closeDecision()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/papers.js"></script>
</body>
</html>
