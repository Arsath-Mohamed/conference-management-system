<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papers - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="header-container"></div>

      <div class="page-container">
        <!-- Conference Info Card -->
        <div class="card" id="conference-info-card" style="display: none; margin-bottom: 24px;">
          <div class="card-header"><h3 class="card-title" id="info-name">Conference Name</h3></div>
          <div class="card-body">
            <p id="info-desc" style="margin-bottom: 16px; color: var(--text-secondary);"></p>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
              <div><strong>Event Date:</strong> <span id="info-date">TBD</span></div>
              <div><strong>Location:</strong> <span id="info-loc">TBD</span></div>
              <div><strong>Submission Deadline:</strong> <span id="info-deadline" style="color: var(--danger); font-weight: 600;">TBD</span></div>
            </div>
          </div>
        </div>
        <!-- Closed message (shown for authors when conference is closed) -->
        <div id="closed-message" class="card" style="display: none; background: #fff3cd; border-color: #ffeeba; margin-bottom: 24px;">
          <div class="card-body" style="color: #856404; padding: 16px;">
            <strong>Notice:</strong> The conference has not yet been announced or submissions are currently closed. You cannot submit new papers at this time.
          </div>
        </div>

        <!-- Submit section (shown for authors) -->
        <div id="submit-section" class="card" style="display: none;">
          <div class="card-header"><h3 class="card-title">Submit New Paper</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Paper Title</label>
              <input type="text" id="title" class="form-input" placeholder="Enter paper title">
            </div>
            <div class="form-group">
              <label class="form-label">Select Conference</label>
              <select id="conferenceId" class="form-input" onchange="updateConferenceTopics()">
                <option value="">-- Choose a Conference --</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Paper Topics</label>
              <div id="topics-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;">
                <!-- Topics will be dynamically loaded here -->
              </div>
              <div class="form-help">Select relevant topics for your submission.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Abstract</label>
              <textarea id="abstract" class="form-textarea" rows="5" placeholder="Enter abstract (minimum 50 characters)"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">PDF File</label>
              <input type="file" id="file" class="form-input" accept=".pdf">
              <div class="form-help">Max 5MB, PDF only.</div>
            </div>
          </div>
          <div class="card-footer">
            <button id="submit-btn" class="btn btn-primary" onclick="submitPaper()">Submit Paper</button>
          </div>
        </div>

        <!-- Bulk actions (shown for admin/chair) -->
        <div id="bulk-actions" style="display: none;">
          <button class="btn btn-danger btn-sm" onclick="deleteAllPapers()">Delete All</button>
          <button class="btn btn-warning btn-sm" onclick="deleteAcceptedPapers()">Delete Accepted</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRejectedPapers()">Delete Rejected</button>
          <button class="btn btn-success btn-sm" onclick="exportPapersCSV()">Export CSV</button>
        </div>

        <!-- Papers list search/filter -->
        <div style="display: flex; gap: 16px; margin-bottom: 20px; align-items: center;">
          <div style="flex: 1; position: relative;">
            <input type="text" id="paper-search" class="form-input" placeholder="Search by title or author name..." oninput="filterPapers()">
          </div>
          <div style="width: 200px;">
            <select id="status-filter" class="form-input" onchange="filterPapers()">
              <option value="all">All Statuses</option>
              <option value="submitted">Submitted</option>
              <option value="under_review">Under Review</option>
              <option value="reviewed">Reviewed</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>

        <!-- Papers list -->
        <div class="card">
          <div class="card-header"><h3 class="card-title">All Papers</h3></div>
          <div class="card-body"><div id="papers-list"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function logout() { localStorage.clear(); window.location.href = "../login.html"; }
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/papers.js"></script>
</body>
</html>
