<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Details - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
      <div id="header-container"></div>
      
      <div class="page-container">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Paper Details</h3>
          </div>
          <div class="card-body">
            <div id="paper-detail">
              <div style="padding: 40px; text-align: center; color: var(--text-muted);">Loading paper details...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    
    if (!token) {
      window.location.href = "../login.html";
    }
    
    function getPaperId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    async function loadPaperDetail() {
      const paperId = getPaperId();
      if (!paperId) {
        window.location.href = "papers.html";
        return;
      }
      
      try {
        const data = await apiCall(`/papers/${paperId}`);
        displayPaperDetail(data.paper, data.reviews);
      } catch (err) {
        console.error(err);
        window.Layout.showToast("Failed to load details.", "error");
        document.getElementById("paper-detail").innerHTML = '<div class="empty-state">Error loading paper.</div>';
      }
    }
    
    function displayPaperDetail(paper, reviews) {
      const container = document.getElementById("paper-detail");
      let statusClass = "badge-pending";
      if (paper.status === "under_review") statusClass = "badge-warning";
      if (paper.status === "reviewed") statusClass = "badge-info";
      if (paper.status === "accepted") statusClass = "badge-accepted";
      if (paper.status === "rejected") statusClass = "badge-rejected";
      
      // 1. Peer Reviews Section
      let reviewsHtml = '<h4 style="margin-top: 32px; border-top: 1px solid var(--border-light); padding-top: 24px;">Peer Review Verdicts</h4>';
      if (reviews && reviews.length > 0) {
        reviewsHtml += '<div style="display: flex; flex-direction: column; gap: 16px; margin-top: 16px;">';
        reviews.forEach(review => {
          const rebuttal = (paper.rebuttals || []).find(r => r.reviewerId === review.reviewerId);
          reviewsHtml += `
            <div class="review-item" style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border-light);">
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-weight: 600; color: var(--primary);">${escapeHtml(review.reviewerName || 'Reviewer')}</span>
                <span style="color: var(--primary); font-weight: 600;">${"★".repeat(review.rating)}${"☆".repeat(5-review.rating)}</span>
              </div>
              <div style="margin-bottom: 8px;">Decision: <strong style="text-transform: capitalize;">${review.decision}</strong></div>
              <p style="color: var(--text-secondary); font-style: italic; font-size: 14px;">"${escapeHtml(review.comment)}"</p>
              
              ${rebuttal ? `
                <div style="margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 8px;">
                  <div style="font-size: 12px; font-weight: 600; margin-bottom: 4px;">Author's Rebuttal:</div>
                  <p style="font-size: 13px; margin: 0;">${escapeHtml(rebuttal.content)}</p>
                </div>
              ` : (paper.authorId === user.id && paper.status === 'reviewed' ? `
                <div style="margin-top: 12px;">
                  <textarea id="rebuttal-${review.reviewerId}" class="form-input" placeholder="Your reply to this review (Optional)..." rows="2"></textarea>
                  <button class="btn btn-sm btn-outline" style="margin-top: 8px;" onclick="submitRebuttal('${review.reviewerId}')">Submit Rebuttal</button>
                </div>
              ` : '')}
            </div>
          `;
        });
        reviewsHtml += '</div>';
      } else {
        reviewsHtml += '<p style="color: var(--text-muted); margin-top: 12px;">No reviews available yet.</p>';
      }

      // 2. Author Actions: Camera-Ready Submission
      let finalSubmissionHtml = '';
      if (paper.authorId === user.id && paper.status === 'accepted') {
        finalSubmissionHtml = `
          <div class="card" style="margin-top: 32px; border: 1px solid var(--success); background: rgba(34, 197, 94, 0.05);">
            <div class="card-header"><h4 class="card-title">🚀 Camera-Ready Submission</h4></div>
            <div class="card-body">
              <p style="font-size: 14px; margin-bottom: 16px;">Congratulations! Your paper has been accepted. Please upload the final camera-ready version below.</p>
              ${paper.finalFile ? `
                <div style="margin-bottom: 16px; color: var(--success); font-weight: 600;">
                  ✅ Final version already uploaded: <a href="${UPLOAD_BASE_URL}/${paper.finalFile}" target="_blank">View Final PDF</a>
                </div>
              ` : ''}
              <div class="form-group">
                <label class="form-label">Final Manuscript (PDF)</label>
                <input type="file" id="final-file" class="form-input" accept=".pdf">
              </div>
              <button class="btn btn-success" onclick="uploadFinal()" id="final-btn">Upload Final Version</button>
            </div>
          </div>
        `;
      }

      // 3. Admin assignment & status
      let adminActions = '';
      if (user.role === 'admin' || user.role === 'chair') {
        adminActions = `
          <div class="admin-actions" style="margin-top: 40px; border-top: 2px solid var(--border-light); padding-top: 32px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
              <div class="card" style="background: var(--bg-secondary);">
                <div class="card-header"><h4 class="card-title">Assign Experts</h4></div>
                <div class="card-body">
                  <div class="form-group">
                    <select id="reviewer-select" class="form-input"><option value="">-- Select Expert --</option></select>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="assignReviewer()">Add Reviewer</button>
                </div>
              </div>
              <div class="card" style="background: var(--bg-secondary);">
                <div class="card-header"><h4 class="card-title">Final Verdict</h4></div>
                <div class="card-body" style="display: flex; gap: 12px;">
                  <button class="btn btn-success" style="flex: 1;" onclick="updateStatus('accepted')">Accept</button>
                  <button class="btn btn-danger" style="flex: 1;" onclick="updateStatus('rejected')">Reject</button>
                </div>
              </div>
            </div>
          </div>
        `;
        setTimeout(loadAllReviewers, 100);
      }

      // 4. Reviewer form
      let reviewerActions = '';
      if (paper.reviewerIds.includes(user.id)) {
        reviewerActions = `
          <div class="reviewer-actions" style="margin-top: 32px; border-top: 1px solid var(--border-light); padding-top: 24px;">
            <h4 style="margin-bottom: 16px;">Submit Your Feedback</h4>
            <div class="form-group">
              <label class="form-label">Rating</label>
              <select id="review-rating" class="form-input">
                <option value="5">5 - Excellent</option><option value="4">4 - Good</option>
                <option value="3" selected>3 - Fair</option><option value="2">2 - Poor</option><option value="1">1 - Bad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Recommendation</label>
              <select id="review-decision" class="form-input">
                <option value="accept">Accept</option><option value="revisions">Revisions</option><option value="reject">Reject</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Comments</label>
              <textarea id="review-comment" class="form-input" rows="4"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="paper-header" style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px;">
          <div>
            <h1 style="margin: 0; font-size: 24px;">${escapeHtml(paper.title)}</h1>
            ${paper.authorName ? `<p style="color: var(--text-secondary); margin: 8px 0;">By ${escapeHtml(paper.authorName)}</p>` : ''}
            <div style="margin-top: 8px; display: flex; gap: 8px;">
              <span style="font-size: 12px; color: var(--text-muted);">Conference: <strong>${escapeHtml(paper.conferenceId?.name || 'Unknown')}</strong></span>
            </div>
            <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px;">
              ${(paper.topics || []).map(t => `<span class="badge" style="background: #e2e8f0; color: #475569; border: none;">${escapeHtml(t)}</span>`).join('')}
            </div>
          </div>
          <span class="badge ${statusClass}">${paper.status.replace('_', ' ').toUpperCase()}</span>
        </div>
        
        <div class="section-card" style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
          <h4 style="margin-top: 0; margin-bottom: 12px;">Abstract</h4>
          <p style="color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap;">${escapeHtml(paper.abstract)}</p>
          <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button onclick="Layout.openPdfPreview('${UPLOAD_BASE_URL}/${paper.file}', '${escapeHtml(paper.title)}')" class="btn btn-outline btn-sm">Preview Manuscript</button>
            ${paper.finalFile ? `<button onclick="Layout.openPdfPreview('${UPLOAD_BASE_URL}/${paper.finalFile}', 'FINAL: ${escapeHtml(paper.title)}')" class="btn btn-success btn-sm">Preview Final Version</button>` : ''}
          </div>
        </div>

        ${finalSubmissionHtml}
        ${reviewsHtml}
        ${reviewerActions}
        ${adminActions}
      `;
    }

    async function uploadFinal() {
      const fileInput = document.getElementById("final-file");
      if (!fileInput.files[0]) return window.Layout.showToast("Select a file first", "error");
      
      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      
      const btn = document.getElementById("final-btn");
      try {
        btn.disabled = true; btn.innerText = "Uploading...";
        await apiCall(`/papers/${getPaperId()}/final`, { method: 'PUT', body: formData });
        window.Layout.showToast("Final version uploaded!", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
      } finally {
        btn.disabled = false; btn.innerText = "Upload Final Version";
      }
    }

    async function submitReview() {
      const payload = {
        reviewRating: document.getElementById('review-rating').value,
        reviewDecision: document.getElementById('review-decision').value,
        reviewComment: document.getElementById('review-comment').value
      };
      try {
        await apiCall(`/papers/${getPaperId()}/review`, { method: 'PUT', body: JSON.stringify(payload) });
        window.Layout.showToast("Review submitted!", "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function loadAllReviewers() {
      const select = document.getElementById('reviewer-select');
      if (!select) return;
      try {
        const reviewers = await apiCall("/papers/reviewers/list");
        reviewers.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r._id; opt.innerText = r.name;
          select.appendChild(opt);
        });
      } catch (err) {}
    }

    async function submitRebuttal(reviewerId) {
      const content = document.getElementById(`rebuttal-${reviewerId}`).value;
      if (!content) return window.Layout.showToast("Review rebuttal required", "error");
      
      try {
        await apiCall(`/papers/${getPaperId()}/rebuttal`, { method: 'PUT', body: JSON.stringify({ content, reviewerId }) });
        window.Layout.showToast("Rebuttal submitted!", "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function assignReviewer() {
      const reviewerId = document.getElementById('reviewer-select').value;
      try {
        await apiCall(`/papers/${getPaperId()}/assign`, { method: 'PUT', body: JSON.stringify({ reviewerId }) });
        window.Layout.showToast("Reviewer added", "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function updateStatus(status) {
      try {
        await apiCall(`/papers/${getPaperId()}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        window.Layout.showToast(`Status set to ${status}`, "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    window.onload = loadPaperDetail;
  </script>
</body>
</html>
