<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Details - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
      <div id="header-container"></div>
      
      <div class="page-container">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Paper Details</h3>
          </div>
          <div class="card-body">
            <div id="paper-detail"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    
    if (!token) {
      window.location.href = "../login.html";
    }
    
    function getPaperId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    async function loadPaperDetail() {
      const paperId = getPaperId();
      if (!paperId) {
        window.location.href = "papers.html";
        return;
      }
      
      try {
        const papers = await apiCall("/papers");
        const paper = papers.find(p => p._id === paperId);
        
        if (!paper) {
          document.getElementById("paper-detail").innerHTML = '<div class="empty-state">Paper not found</div>';
          return;
        }
        
        displayPaperDetail(paper);
      } catch (err) {
        console.error(err);
        window.Layout.showToast("Failed to load paper details", "error");
      }
    }
    
    function displayPaperDetail(paper) {
      const container = document.getElementById("paper-detail");
      let statusClass = "badge-pending";
      if (paper.status === "accepted") statusClass = "badge-accepted";
      if (paper.status === "rejected") statusClass = "badge-rejected";
      
      let reviewsHtml = '<h4>Reviews</h4>';
      if (paper.reviews && paper.reviews.length > 0) {
        paper.reviews.forEach(review => {
          reviewsHtml += `
            <div class="review-complete" style="margin-top: 16px;">
              <div class="review-rating">Rating: ${"★".repeat(review.rating)} (${review.rating}/5)</div>
              <div class="review-decision">Decision: ${review.decision}</div>
              <div class="review-comment">Comment: ${escapeHtml(review.comment)}</div>
            </div>
          `;
        });
      } else {
        reviewsHtml += '<p>No reviews yet</p>';
      }

      // Add Admin/Chair Actions
      let adminActions = '';
      if (user.role === 'admin' || user.role === 'chair') {
        adminActions = `
          <div class="admin-actions-section" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-light);">
            <h4 style="margin-bottom: 24px; color: var(--primary);">Administrator Control Panel</h4>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
              <!-- Assignment Card -->
              <div class="card" style="background: var(--bg-secondary); border: 1px solid var(--border-light);">
                <div class="card-header"><h4 class="card-title">Reviewer Assignment</h4></div>
                <div class="card-body">
                  <div class="form-group">
                    <label class="form-label">Current Reviewer: <span id="current-reviewer" style="color: var(--primary);">${paper.reviewerName || 'None'}</span></label>
                    <select id="reviewer-select" class="form-input">
                      <option value="">-- Choose Reviewer --</option>
                    </select>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="assignReviewer()" id="assign-btn">Assign Selected</button>
                </div>
              </div>

              <!-- Status Card -->
              <div class="card" style="background: var(--bg-secondary); border: 1px solid var(--border-light);">
                <div class="card-header"><h4 class="card-title">Verdict & Decision</h4></div>
                <div class="card-body">
                  <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">Set the final status of this paper after the review process.</p>
                  <div style="display: flex; gap: 12px;">
                    <button class="btn btn-success" onclick="updateStatus('accepted')">Accept</button>
                    <button class="btn btn-danger" onclick="updateStatus('rejected')">Reject</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card" style="background: var(--bg-secondary); border: 1px solid var(--border-light);">
              <div class="card-header"><h4 class="card-title">Set Presentation Schedule</h4></div>
              <div class="card-body">
                <div class="form-group">
                  <label class="form-label">Date</label>
                  <input type="date" id="sched-date" class="form-input" value="${paper.schedule?.date || ''}">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                  <div class="form-group">
                    <label class="form-label">Time</label>
                    <input type="time" id="sched-time" class="form-input" value="${paper.schedule?.time || ''}">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Room</label>
                    <input type="text" id="sched-room" class="form-input" placeholder="e.g. Hall A" value="${paper.schedule?.room || ''}">
                  </div>
                </div>
                <button class="btn btn-primary" onclick="updateSchedule()">Save Schedule</button>
              </div>
            </div>
          </div>
        `;
        
        // After inserting HTML, we need to load reviewers
        setTimeout(loadReviewers, 100);
      }
      
      container.innerHTML = `
        <div class="paper-detail">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h1 style="margin-top:0;">${escapeHtml(paper.title)}</h1>
            <span class="badge ${statusClass}">${paper.status}</span>
          </div>
          <div class="paper-meta" style="margin-bottom: 24px; font-size: 14px; color: var(--text-secondary);">
            <span>By: <strong>${escapeHtml(paper.authorName)}</strong></span>
            <span style="margin: 0 12px;">|</span>
            <span>Submitted: ${new Date(paper.createdAt).toLocaleDateString()}</span>
          </div>
          <h4>Abstract</h4>
          <p style="margin-bottom: 24px; color: var(--text-secondary); line-height: 1.6;">${escapeHtml(paper.abstract)}</p>
          ${paper.file ? `<a href="${UPLOAD_BASE_URL}/${paper.file}" target="_blank" class="btn btn-outline btn-sm" style="margin-bottom: 24px;">View PDF Document</a>` : ""}
          
          ${paper.schedule && paper.schedule.date ? `
            <div class="schedule-info" style="background: rgba(59, 130, 246, 0.1); padding: 16px; border-radius: 8px; margin-bottom: 32px; border-left: 4px solid var(--primary);">
              <h4 style="margin-top:0; color: var(--primary);">Presentation Scheduled</h4>
              <p style="margin:0; font-weight: 500;">${paper.schedule.date} at ${paper.schedule.time} — <strong>${paper.schedule.room}</strong></p>
            </div>
          ` : ""}
          
          ${reviewsHtml}
          ${adminActions}
        </div>
      `;
    }

    async function loadReviewers() {
      const select = document.getElementById('reviewer-select');
      if (!select) return;
      
      try {
        const reviewers = await apiCall("/papers/reviewers");
        reviewers.forEach(rev => {
          const option = document.createElement('option');
          option.value = rev._id;
          option.textContent = `${rev.name} (${rev.email})`;
          select.appendChild(option);
        });
      } catch (err) {
        console.error("Failed to load reviewers:", err);
      }
    }

    async function assignReviewer() {
      const paperId = getPaperId();
      const reviewerId = document.getElementById('reviewer-select').value;
      if (!reviewerId) {
        window.Layout.showToast("Please select a reviewer", "error");
        return;
      }
      
      const btn = document.getElementById('assign-btn');
      try {
        btn.disabled = true;
        btn.textContent = "Assigning...";
        
        await apiCall(`/papers/${paperId}/assign`, {
          method: 'PUT',
          body: JSON.stringify({ reviewerId })
        });
        
        window.Layout.showToast("Reviewer assigned successfully", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Assign Selected";
      }
    }

    async function updateStatus(status) {
      const paperId = getPaperId();
      try {
        await apiCall(`/papers/${paperId}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status })
        });
        window.Layout.showToast(`Paper ${status} successfully`, "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
      }
    }

    async function updateSchedule() {
      const paperId = getPaperId();
      const date = document.getElementById('sched-date').value;
      const time = document.getElementById('sched-time').value;
      const room = document.getElementById('sched-room').value;

      if (!date || !time || !room) {
        window.Layout.showToast("Please fill in all schedule fields", "error");
        return;
      }

      try {
        await apiCall(`/papers/${paperId}/schedule`, {
          method: 'PUT',
          body: JSON.stringify({ date, time, room })
        });
        window.Layout.showToast("Schedule updated successfully", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
      }
    }
    
    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }
    
    window.onload = loadPaperDetail;
  </script>
</body>
</html>
