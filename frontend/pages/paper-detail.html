<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Details - Conference Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
      <div id="header-container"></div>
      
      <div class="page-container">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Paper Details</h3>
          </div>
          <div class="card-body">
            <div id="paper-detail">
              <div style="padding: 40px; text-align: center; color: var(--text-muted);">Loading paper details...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const user = window.getUser();
    
    if (!token) {
      window.location.href = "../login.html";
    }
    
    function getPaperId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    async function loadPaperDetail() {
      const paperId = getPaperId();
      if (!paperId) {
        window.location.href = "papers.html";
        return;
      }
      
      try {
        const result = await apiCall(`/papers/${paperId}`);
        // result could be { paper, reviews } directly since apiCall returns json.data
        const paper = result.paper || result;
        const reviews = result.reviews || [];
        displayPaperDetail(paper, reviews);
      } catch (err) {
        console.error(err);
        window.Layout.showToast("Failed to load details.", "error");
        document.getElementById("paper-detail").innerHTML = '<div class="empty-state">Error loading paper.</div>';
      }
    }
    
    function displayPaperDetail(paper, reviews) {
      const container = document.getElementById("paper-detail");
      let statusClass = "badge-pending";
      if (paper.status === "under_review") statusClass = "badge-warning";
      if (paper.status === "reviewed") statusClass = "badge-info";
      if (paper.status === "accepted") statusClass = "badge-accepted";
      if (paper.status === "rejected") statusClass = "badge-rejected";
      if (paper.status === "revision") statusClass = "badge-revision";
      
      // 1. Peer Reviews Section
      const isAuthor = String(paper.authorId) === String(user.id);
      const canRebuttal = isAuthor; // Show rebuttal form whenever author views paper with reviews

      let reviewsHtml = '<h4 style="margin-top: 32px; border-top: 1px solid var(--border-light); padding-top: 24px;">Peer Review Verdicts</h4>';
      if (reviews && reviews.length > 0) {
        reviewsHtml += `<p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">Displaying ${reviews.length} feedback(s) from assigned experts.</p>`;
        reviewsHtml += '<div style="display: flex; flex-direction: column; gap: 16px;">';
        reviews.forEach(review => {
          const rebuttal = (paper.rebuttals || []).find(r => String(r.reviewerId) === String(review.reviewerId || review._id));
          reviewsHtml += `
            <div class="review-item" style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border-light);">
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-weight: 600; color: var(--primary);">${escapeHtml(review.reviewerName || 'Reviewer')}</span>
                <span style="color: var(--primary); font-weight: 600;">${"★".repeat(review.rating || 0)}${"☆".repeat(5-(review.rating || 0))}</span>
              </div>
              <div style="margin-bottom: 8px; font-size: 13px;">Recommendation: <strong style="text-transform: capitalize; color: var(--text-primary);">${review.recommendation || 'N/A'}</strong></div>
              <p style="color: var(--text-secondary); font-style: italic; font-size: 14px; line-height: 1.5;">&ldquo;${escapeHtml(review.comments || '')}&rdquo;</p>
              
              ${rebuttal ? `
                <div style="margin-top: 12px; padding: 12px; background: rgba(59,130,246,0.08); border-radius: 8px; border-left: 3px solid var(--primary);">
                  <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; color: var(--primary);">✍️ Author's Rebuttal:</div>
                  <p style="font-size: 13px; margin: 0; color: var(--text-primary);">${escapeHtml(rebuttal.content)}</p>
                </div>
              ` : ''}
            </div>
          `;
        });
        reviewsHtml += '</div>';

        // Dedicated Rebuttal Section for Author
        if (canRebuttal) {
          reviewsHtml += `
            <div style="margin-top: 24px; padding: 20px; background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.2); border-radius: 12px;">
              <h4 style="margin: 0 0 8px 0; color: var(--primary);">✍️ Submit Your Rebuttal</h4>
              <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">You can write a response to address the reviewers' comments. Select the reviewer you are replying to, then write your rebuttal.</p>
              <div class="form-group">
                <label class="form-label">Responding to Reviewer</label>
                <select id="rebuttal-reviewer-select" class="form-input">
                  <option value="">-- Select Reviewer --</option>
                  ${reviews.map(r => `<option value="${r.reviewerId || r._id}">${escapeHtml(r.reviewerName || 'Reviewer')}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Your Rebuttal</label>
                <textarea id="rebuttal-content" class="form-textarea" rows="5" placeholder="Write your response to the reviewer's comments. Be specific and address each point raised..."></textarea>
              </div>
              <button class="btn btn-primary" onclick="submitRebuttal()">Submit Rebuttal</button>
            </div>
          `;
        }
      } else {
        reviewsHtml += '<div class="empty-state" style="padding: 20px; background: var(--bg-secondary); border-radius: 8px;"><p style="color: var(--text-muted); margin: 0;">No reviews available yet. Experts are currently processing the manuscript.</p></div>';
      }

      // 2. Author Actions: Camera-Ready Submission
      const isAuthor2 = String(paper.authorId) === String(user.id);
      let finalSubmissionHtml = '';
      if (isAuthor2 && paper.status === 'accepted') {
        finalSubmissionHtml = `
          <div class="card" style="margin-top: 32px; border: 1px solid var(--success); background: rgba(34, 197, 94, 0.05);">
            <div class="card-header"><h4 class="card-title">🚀 Camera-Ready Submission</h4></div>
            <div class="card-body">
              <p style="font-size: 14px; margin-bottom: 16px;">Congratulations! Your paper has been accepted. Please upload the final camera-ready version below.</p>
              ${paper.finalFile ? `
                <div style="margin-bottom: 16px; color: var(--success); font-weight: 600;">
                  ✅ Final version already uploaded: <a href="${UPLOAD_BASE_URL}/${paper.finalFile}" target="_blank">View Final PDF</a>
                </div>
              ` : ''}
              <div class="form-group">
                <label class="form-label">Final Manuscript (PDF)</label>
                <input type="file" id="final-file" class="form-input" accept=".pdf">
              </div>
              <button class="btn btn-success" onclick="uploadFinal()" id="final-btn">Upload Final Version</button>
            </div>
          </div>
        `;
      }

      // 3. Admin assignment & status
      let adminActions = '';
      if (user.role === 'admin' || user.role === 'chair') {

        // Schedule card — only for accepted papers
        const scheduleCard = paper.status === 'accepted' ? `
          <div class="card" style="background: var(--bg-secondary); margin-top: 20px; border: 1px solid rgba(16,185,129,0.3);">
            <div class="card-header"><h4 class="card-title">📅 Schedule Presentation</h4></div>
            <div class="card-body">
              ${paper.schedule?.date ? `
                <div style="margin-bottom: 12px; padding: 10px; background: rgba(16,185,129,0.1); border-radius: 8px; font-size: 13px;">
                  <strong style="color: #10b981;">✅ Already Scheduled:</strong>
                  &nbsp; ${paper.schedule.date} &nbsp;|&nbsp; ${paper.schedule.time || 'TBD'} &nbsp;|&nbsp; ${paper.schedule.room || 'TBD'}
                </div>
              ` : '<p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">No schedule set yet. Fill in the details below.</p>'}
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                <div class="form-group">
                  <label class="form-label">Date</label>
                  <input type="date" id="sched-date" class="form-input" value="${paper.schedule?.date || ''}">
                </div>
                <div class="form-group">
                  <label class="form-label">Time</label>
                  <input type="time" id="sched-time" class="form-input" value="${paper.schedule?.time || ''}">
                </div>
                <div class="form-group">
                  <label class="form-label">Room / Hall</label>
                  <input type="text" id="sched-room" class="form-input" placeholder="e.g. Hall A" value="${paper.schedule?.room || ''}">
                </div>
              </div>
              <button class="btn btn-success btn-sm" style="width: 100%; margin-top: 4px;" onclick="schedulePresentation()">
                ${paper.schedule?.date ? '🔄 Update Schedule' : '📅 Set Schedule'}
              </button>
            </div>
          </div>
        ` : `<p style="font-size:12px;color:var(--text-muted);margin-top:12px;">💡 Schedule becomes available once the paper is <strong>Accepted</strong>.</p>`;

        adminActions = `
          <div class="admin-actions" style="margin-top: 40px; border-top: 2px solid var(--border-light); padding-top: 32px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
              <div class="card" style="background: var(--bg-secondary);">
                <div class="card-header"><h4 class="card-title">Assign Experts</h4></div>
                <div class="card-body">
                  <div id="assigned-reviewers" style="margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px;">
                    <!-- Dynamically loaded -->
                  </div>
                  <div class="form-group">
                    <select id="reviewer-select" class="form-input"><option value="">-- Select Expert --</option></select>
                  </div>
                  <button class="btn btn-primary btn-sm" style="width: 100%;" onclick="assignReviewer()">Assign Reviewer</button>
                </div>
              </div>
              <div class="card" style="background: var(--bg-secondary);">
                <div class="card-header"><h4 class="card-title">Final Verdict</h4></div>
                <div class="card-body" style="display: flex; flex-wrap: wrap; gap: 12px;">
                  <button class="btn btn-success" style="flex: 1;" onclick="makeDecision('accepted')">Accept</button>
                  <button class="btn btn-danger" style="flex: 1;" onclick="makeDecision('rejected')">Reject</button>
                  <button class="btn btn-warning" style="flex: 1; min-width: 100%;" onclick="makeDecision('revision')">Request Revision</button>
                </div>
              </div>
            </div>
            ${scheduleCard}
          </div>
        `;
        setTimeout(loadAllReviewers, 100);
      }

      // 4. Reviewer form
      let reviewerActions = '';
      const isAssignedReviewer = (paper.reviewerIds || []).some(id => String(id) === String(user.id));
      if (isAssignedReviewer) {
        reviewerActions = `
          <div class="reviewer-actions" style="margin-top: 32px; border-top: 1px solid var(--border-light); padding-top: 24px;">
            <h4 style="margin-bottom: 16px;">Submit Your Feedback</h4>
            <div class="form-group">
              <label class="form-label">Rating</label>
              <select id="review-rating" class="form-input">
                <option value="5">5 - Excellent</option><option value="4">4 - Good</option>
                <option value="3" selected>3 - Fair</option><option value="2">2 - Poor</option><option value="1">1 - Bad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Recommendation</label>
              <select id="review-decision" class="form-input">
                <option value="accept">Accept</option><option value="revision">Revision</option><option value="reject">Reject</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Comments</label>
              <textarea id="review-comment" class="form-input" rows="4"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="paper-header" style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px;">
          <div>
            <h1 style="margin: 0; font-size: 24px;">${escapeHtml(paper.title)}</h1>
            ${paper.authorName ? `<p style="color: var(--text-secondary); margin: 8px 0;">By ${escapeHtml(paper.authorName)}</p>` : ''}
            <div style="margin-top: 8px; display: flex; gap: 8px;">
              <span style="font-size: 12px; color: var(--text-muted);">Conference: <strong>${escapeHtml(paper.conferenceId?.name || 'Unknown')}</strong></span>
            </div>
            <div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px;">
              ${(paper.topics || []).map(t => `<span class="topic-tag">${escapeHtml(t)}</span>`).join('')}
            </div>
          </div>
          <span class="badge ${statusClass}">${paper.status.replace('_', ' ').toUpperCase()}</span>
        </div>
        
        <div class="section-card" style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
          <h4 style="margin-top: 0; margin-bottom: 12px;">Abstract</h4>
          <p style="color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap;">${escapeHtml(paper.abstract)}</p>
          <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button onclick="Layout.openPdfPreview('${UPLOAD_BASE_URL}/${paper.file}', '${escapeHtml(paper.title)}')" class="btn btn-outline btn-sm">Preview Manuscript</button>
            ${paper.finalFile ? `<button onclick="Layout.openPdfPreview('${UPLOAD_BASE_URL}/${paper.finalFile}', 'FINAL: ${escapeHtml(paper.title)}')" class="btn btn-success btn-sm">Preview Final Version</button>` : ''}
          </div>
        </div>

        ${finalSubmissionHtml}
        ${reviewsHtml}
        ${reviewerActions}
        ${adminActions}
      `;
    }

    async function uploadFinal() {
      const fileInput = document.getElementById("final-file");
      if (!fileInput.files[0]) return window.Layout.showToast("Select a file first", "error");
      
      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      
      const btn = document.getElementById("final-btn");
      try {
        btn.disabled = true; btn.innerText = "Uploading...";
        await apiCall(`/papers/${getPaperId()}/final`, { method: 'PUT', body: formData });
        window.Layout.showToast("Final version uploaded!", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
      } finally {
        btn.disabled = false; btn.innerText = "Upload Final Version";
      }
    }

    async function submitReview() {
      const payload = {
        reviewRating: document.getElementById('review-rating').value,
        reviewDecision: document.getElementById('review-decision').value,
        reviewComment: document.getElementById('review-comment').value
      };
      try {
        await apiCall(`/papers/${getPaperId()}/review`, { method: 'PUT', body: JSON.stringify(payload) });
        window.Layout.showToast("Review submitted!", "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function loadAllReviewers() {
      const select = document.getElementById('reviewer-select');
      const assignedContainer = document.getElementById('assigned-reviewers');
      if (!select) return;
      try {
        const reviewers = await apiCall("/papers/reviewers/list");
        const paper = (await apiCall(`/papers/${getPaperId()}`)).paper;
        
        // Show already assigned
        const assignedIds = paper.reviewerIds || [];
        assignedContainer.innerHTML = assignedIds.length > 0 ? '' : '<small style="color: var(--text-muted)">No experts assigned yet.</small>';
        
        reviewers.forEach(r => {
          if (assignedIds.includes(r._id)) {
             assignedContainer.innerHTML += `<span class="badge badge-info" style="font-size: 10px;">${r.name} ✓</span>`;
          } else {
            const opt = document.createElement('option');
            opt.value = r._id; opt.innerText = r.name;
            select.appendChild(opt);
          }
        });
      } catch (err) { console.error(err); }
    }

    async function submitRebuttal() {
      const reviewerId = document.getElementById('rebuttal-reviewer-select')?.value;
      const content = document.getElementById('rebuttal-content')?.value?.trim();

      if (!reviewerId) return window.Layout.showToast("Please select a reviewer to respond to.", "error");
      if (!content) return window.Layout.showToast("Rebuttal content cannot be empty.", "error");

      try {
        const btn = event.target;
        btn.disabled = true; btn.innerText = "Submitting...";
        await apiCall(`/papers/${getPaperId()}/rebuttal`, { method: 'PUT', body: JSON.stringify({ content, reviewerId }) });
        window.Layout.showToast("Rebuttal submitted successfully!", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
        const btn = document.querySelector('[onclick="submitRebuttal()"]');
        if (btn) { btn.disabled = false; btn.innerText = "Submit Rebuttal"; }
      }
    }

    async function assignReviewer() {
      const reviewerId = document.getElementById('reviewer-select').value;
      try {
        await apiCall(`/papers/${getPaperId()}/assign`, { method: 'PUT', body: JSON.stringify({ reviewerId }) });
        window.Layout.showToast("Reviewer added", "success");
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function makeDecision(decision) {
      if (!confirm(`Make final decision: ${decision.toUpperCase()}?`)) return;
      try {
        const res = await apiCall(`/papers/${getPaperId()}/decision`, { 
          method: 'PUT', 
          body: JSON.stringify({ decision }) 
        });
        // res may be { paper, stats } or just the data wrapper
        const stats = res?.stats;
        if (stats) {
          const msg = `Verdict: ${decision.toUpperCase()}. Avg Rating: ${stats.averageRating}. Votes: ${stats.decisionSummary?.accept || 0} Accept / ${stats.decisionSummary?.reject || 0} Reject.`;
          window.Layout.showToast(msg, "success");
        } else {
          window.Layout.showToast(`Decision recorded: ${decision.toUpperCase()}`, "success");
        }
        loadPaperDetail();
      } catch (err) { window.Layout.showToast(err.message, "error"); }
    }

    async function schedulePresentation() {
      const date = document.getElementById('sched-date').value;
      const time = document.getElementById('sched-time').value;
      const room = document.getElementById('sched-room').value.trim();

      if (!date || !room) {
        return window.Layout.showToast("Date and Room are required to schedule a presentation.", "error");
      }

      try {
        const btn = event.target;
        btn.disabled = true; btn.innerText = "Saving...";
        await apiCall(`/papers/${getPaperId()}/schedule`, {
          method: 'PUT',
          body: JSON.stringify({ date, time, room })
        });
        window.Layout.showToast("Presentation scheduled successfully! 📅", "success");
        loadPaperDetail();
      } catch (err) {
        window.Layout.showToast(err.message, "error");
        const btn = document.querySelector('[onclick="schedulePresentation()"]');
        if (btn) { btn.disabled = false; btn.innerText = "📅 Set Schedule"; }
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    window.onload = loadPaperDetail;
  </script>
</body>
</html>
