<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In - Confy</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* distinct admin theme overriding login-page */
    .login-page.admin-theme {
      background: #09090b;
      background-image: radial-gradient(circle at top right, #3b0764 0%, #09090b 50%);
    }
    
    .login-page.admin-theme .login-card {
      border-top: 4px solid #8b5cf6;
    }
    
    .login-page.admin-theme .login-btn {
      background: #8b5cf6;
    }
    
    .login-page.admin-theme .login-btn:hover {
      background: #7c3aed;
    }
    
    .admin-badge {
      display: inline-block;
      background: rgba(139, 92, 246, 0.1);
      color: #7c3aed;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
  </style>
</head>
<body class="login-page admin-theme">
  <div class="login-container">
    <div class="login-card">
      <a href="index.html" class="back-link">← Back to Home</a>
      <div class="login-header">
        <div class="logo-large">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <h1>Confy</h1>
        </div>
        <p class="login-subtitle">Conference Management System</p>
        <span class="admin-badge">Admin & Chair Portal</span>
      </div>
      
      <form onsubmit="event.preventDefault(); adminLogin()">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Enter password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary login-btn" id="login-btn-text">Sign in to Dashboard</button>
      </form>
      
      <div class="login-footer">
        <p>Not an admin? <a href="login.html" style="color:#8b5cf6">User Login</a></p>
      </div>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script>
    function togglePassword() {
      const pass = document.getElementById("password");
      const btn = event.target;
      if (pass.type === "password") {
        pass.type = "text";
        btn.textContent = "Hide";
      } else {
        pass.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
