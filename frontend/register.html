<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Confy</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-large">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4H20V20H4V4Z" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M8 8H16V10H8V8ZM8 12H14V14H8V12ZM8 16H12V18H8V16Z" fill="currentColor"/>
          </svg>
          <h1>Create account</h1>
        </div>
        <p class="login-subtitle">Join the conference management platform</p>
      </div>
      
      <form onsubmit="event.preventDefault(); register()">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Create a password" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="role" class="form-select">
            <option value="author">Author</option>
            <option value="reviewer">Reviewer</option>
            <option value="chair">Conference Chair</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary login-btn">Create account</button>
      </form>
      
      <div class="login-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
</body>
</html>
